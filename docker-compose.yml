version: "3.9"

services:
  mongo:
    build:
      context: ./deploy/mongo

    container_name: bug-tracking-mongo

    restart: unless-stopped

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-bugtracker}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-bugtracker}
      MONGO_INITDB_DATABASE: ${MONGO_APP_DATABASE:-bugtracker}

    ports:
      - "${MONGO_PORT:-27017}:27017"

    volumes:
      - mongo-data:/data/db

    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  backend:
    build:
      context: ./backend

    container_name: bug-tracking-backend

    restart: unless-stopped

    environment:
      NODE_ENV: production
      PORT: 5000

      JWT_SECRET: ${JWT_SECRET:-change-me}

      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME:-bugtracker}:${MONGO_ROOT_PASSWORD:-bugtracker}@mongo:27017/${MONGO_APP_DATABASE:-bugtracker}?authSource=admin
      REDIS_URL: redis://redis:6379

      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-admin123}
      ENABLE_ADMIN_DEFAULT_LOGIN: ${ENABLE_ADMIN_DEFAULT_LOGIN:-true}

      EMAIL_HOST: ${EMAIL_HOST:-smtp.hostinger.com}
      EMAIL_PORT: ${EMAIL_PORT:-465}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_SECURE: ${EMAIL_SECURE:-true}
      EMAIL_FROM: ${EMAIL_FROM:-Pirnav Support <no-reply@example.com>}

      APP_URL: ${APP_URL:-https://app.renivval.com}
      FRONTEND_URL: ${FRONTEND_URL:-https://app.renivval.com}

      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy

    ports:
      - "${BACKEND_PORT:-5000}:5000"

    volumes:
      - ./backend/uploads:/app/uploads

    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: bug-tracking-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  coturn:
    image: coturn/coturn
    container_name: coturn
    restart: unless-stopped
    network_mode: host
    command: >
      -n
      --realm=app.renivval.com
      --external-ip=65.2.115.155
      --listening-port=3478
      --tls-listening-port=5349
      --min-port=49160
      --max-port=49200
      --lt-cred-mech
      --user=turnuser:StrongTurnPassword123
      --fingerprint
      --no-multicast-peers
      --no-cli
  
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_ENABLE_ADMIN_DEFAULT_LOGIN: ${VITE_ENABLE_ADMIN_DEFAULT_LOGIN:-true}
        VITE_DEBUG_TEAM_SELECTION: ${VITE_DEBUG_TEAM_SELECTION:-false}
        VITE_STUN_URL: ${VITE_STUN_URL:-stun:stun.l.google.com:19302}
        VITE_TURN_URL: ${VITE_TURN_URL:-turn:app.renivval.com:3478?transport=udp}
        VITE_TURN_USERNAME: ${VITE_TURN_USERNAME:-turnuser}
        VITE_TURN_CREDENTIAL: ${VITE_TURN_CREDENTIAL:-StrongTurnPassword123}
        VITE_ICE_TRANSPORT_POLICY: ${VITE_ICE_TRANSPORT_POLICY:-all}

    container_name: bug-tracking-frontend

    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  mongo-data:
