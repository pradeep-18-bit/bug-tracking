version: "3.9"

services:
  mongo:
    build:
      context: ./deploy/mongo

    container_name: bug-tracking-mongo

    restart: unless-stopped

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-bugtracker}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-bugtracker}
      MONGO_INITDB_DATABASE: ${MONGO_APP_DATABASE:-bugtracker}

    ports:
      - "${MONGO_PORT:-27017}:27017"

    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend

    container_name: bug-tracking-backend

    restart: unless-stopped

    environment:
      NODE_ENV: production
      PORT: 5000

      JWT_SECRET: ${JWT_SECRET:-change-me}

      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME:-bugtracker}:${MONGO_ROOT_PASSWORD:-bugtracker}@mongo:27017/${MONGO_APP_DATABASE:-bugtracker}?authSource=admin

      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-admin123}
      ENABLE_ADMIN_DEFAULT_LOGIN: ${ENABLE_ADMIN_DEFAULT_LOGIN:-true}

      EMAIL_HOST: ${EMAIL_HOST:-smtp.hostinger.com}
      EMAIL_PORT: ${EMAIL_PORT:-465}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_SECURE: ${EMAIL_SECURE:-true}
      EMAIL_FROM: ${EMAIL_FROM:-Pirnav Support <no-reply@example.com>}

      APP_URL: ${APP_URL:-https://app.renivval.com}
      FRONTEND_URL: ${FRONTEND_URL:-https://app.renivval.com}

    depends_on:
      - mongo

    ports:
      - "${BACKEND_PORT:-5000}:5000"

    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_ENABLE_ADMIN_DEFAULT_LOGIN: ${VITE_ENABLE_ADMIN_DEFAULT_LOGIN:-true}
        VITE_DEBUG_TEAM_SELECTION: ${VITE_DEBUG_TEAM_SELECTION:-false}

    container_name: bug-tracking-frontend

    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  mongo-data:
